    <script>
        const quizData = {
            questions: [
                {
                    "id": "tm2_q1",
                    "question": "What is a bonding curve in the context of token economics?",
                    "options": {
                        "A": "A legal contract that bonds token issuers to a fixed exchange rate",
                        "B": "A mathematical function that defines the relationship between a token's price and its supply, encoded in a smart contract",
                        "C": "A technical term for the yield curve of staking rewards over time",
                        "D": "A governance mechanism that bonds voters to their decisions for a fixed period"
                    },
                    "correct": "B",
                    "explanation": "A bonding curve is a mathematical function embedded in a smart contract that algorithmically determines a token's price based on its current supply. As tokens are purchased (minted), the price moves along the curve upward; as tokens are sold (burned), the price moves downward. This creates automated, continuous price discovery without order books."
                },
                {
                    "id": "tm2_q2",
                    "question": "In a linear bonding curve defined by $P = mS + b$, what happens to the price as supply S increases?",
                    "options": {
                        "A": "Price increases at an accelerating rate",
                        "B": "Price increases at a constant rate determined by slope m",
                        "C": "Price remains constant regardless of supply changes",
                        "D": "Price decreases linearly as more tokens are minted"
                    },
                    "correct": "B",
                    "explanation": "In the linear formula P = mS + b, the price P increases by exactly m for each additional unit of supply S. The slope m determines the constant rate of price increase, and b is the starting price at zero supply. This means early buyers always get a lower price than later buyers, but the rate of price increase never changes."
                },
                {
                    "id": "tm2_q3",
                    "question": "How does a polynomial bonding curve $P = S^n$ with $n > 1$ differ from a linear curve?",
                    "options": {
                        "A": "It decreases in price as supply grows",
                        "B": "Price increases at an accelerating rate as supply grows, rewarding early buyers more heavily",
                        "C": "It maintains a constant price regardless of supply",
                        "D": "It only allows price increases during specific time windows"
                    },
                    "correct": "B",
                    "explanation": "With n > 1 in P = S^n, the price increase accelerates as supply grows. At low supply the price rises slowly, but at high supply each additional token costs significantly more. This creates a steeper advantage for early participants compared to linear curves, where the price increase rate is constant."
                },
                {
                    "id": "tm2_q4",
                    "question": "What is the reserve ratio (also called connector weight) in the Bancor bonding curve formula?",
                    "options": {
                        "A": "The percentage of transaction fees collected by the protocol",
                        "B": "The ratio between the reserve token balance held in the contract and the total market cap of the issued token",
                        "C": "The maximum percentage of tokens that can be sold in a single transaction",
                        "D": "The ratio of governance votes required to change curve parameters"
                    },
                    "correct": "B",
                    "explanation": "The reserve ratio (or connector weight) in the Bancor formula is the ratio of the reserve token balance to the continuous token's total value (price times supply). A reserve ratio of 50% means the reserve holds half the market cap value. This ratio determines the curve shape: lower ratios create steeper curves with more price sensitivity to supply changes."
                },
                {
                    "id": "tm2_q5",
                    "question": "In the Bancor formula, what happens when the constant reserve ratio (CRR) is set to 50%?",
                    "options": {
                        "A": "The price remains completely fixed",
                        "B": "The bonding curve behaves like a linear price function",
                        "C": "The bonding curve follows a square root relationship, equivalent to a constant product curve",
                        "D": "The token can only be bought, never sold"
                    },
                    "correct": "C",
                    "explanation": "When the CRR is 50%, the Bancor formula produces a curve where price is proportional to the square root of supply. This creates the same constant product relationship (x * y = k) used in Uniswap-style AMMs. Lower CRR values create steeper curves with more price volatility, while higher values create flatter curves."
                },
                {
                    "id": "tm2_q6",
                    "question": "What is slippage in the context of a bonding curve transaction?",
                    "options": {
                        "A": "The time delay between submitting and confirming a transaction",
                        "B": "The difference between the expected price and the actual execution price due to the trade size moving the price along the curve",
                        "C": "The fee charged by miners for processing the transaction",
                        "D": "The depreciation of token value due to inflation"
                    },
                    "correct": "B",
                    "explanation": "Slippage occurs because buying or selling tokens on a bonding curve changes the price as the transaction executes. A large buy order moves the supply (and thus price) upward during execution, so the average price paid is higher than the initial spot price. The magnitude of slippage depends on trade size relative to total supply and the steepness of the curve."
                },
                {
                    "id": "tm2_q7",
                    "question": "What is front-running (MEV extraction) on a bonding curve, and why is it problematic?",
                    "options": {
                        "A": "Running automated tests on smart contracts before deployment to mainnet",
                        "B": "A validator or bot observing a pending large buy order and inserting their own buy before it to profit from the price increase",
                        "C": "The practice of listing a token on multiple exchanges simultaneously",
                        "D": "Deploying a bonding curve contract before the official launch date"
                    },
                    "correct": "B",
                    "explanation": "Front-running on bonding curves occurs when an attacker sees a pending large buy in the mempool, quickly submits their own buy at the current lower price, then sells after the victim's trade pushes the price up. This sandwich attack extracts value from legitimate users and is a major form of MEV (Maximal Extractable Value) that undermines fair price discovery."
                },
                {
                    "id": "tm2_q8",
                    "question": "What is an augmented bonding curve?",
                    "options": {
                        "A": "A bonding curve that uses artificial intelligence to predict optimal prices",
                        "B": "A bonding curve enhanced with a funding pool and tribute mechanism, where a portion of buy-side capital is diverted to fund a project treasury",
                        "C": "A bonding curve that only operates during business hours",
                        "D": "A bonding curve that automatically increases its slope every month"
                    },
                    "correct": "B",
                    "explanation": "An augmented bonding curve, developed by the Commons Stack, adds a funding mechanism on top of a standard bonding curve. A configurable percentage (tribute) of each token purchase is diverted to a common funding pool for project development, while the remainder enters the reserve backing the curve. This creates a built-in fundraising mechanism for continuous organizations."
                },
                {
                    "id": "tm2_q9",
                    "question": "In a constant product AMM (x * y = k), what determines the price of token X in terms of token Y?",
                    "options": {
                        "A": "A governance vote by liquidity providers",
                        "B": "The ratio of the reserve balances: Price = y / x",
                        "C": "An external oracle that feeds the current market price",
                        "D": "The total number of liquidity providers in the pool"
                    },
                    "correct": "B",
                    "explanation": "In a constant product AMM with invariant x * y = k, the marginal price of token X in terms of token Y is simply the ratio y/x of the two reserve balances. As traders buy X (removing it from the pool and adding Y), x decreases and y increases, making X more expensive. This is the core pricing mechanism behind Uniswap v2."
                },
                {
                    "id": "tm2_q10",
                    "question": "What is impermanent loss for a liquidity provider in a constant product AMM?",
                    "options": {
                        "A": "The gas fees paid to add and remove liquidity from the pool",
                        "B": "The loss in value compared to simply holding the assets, caused by the AMM rebalancing the pool as prices change",
                        "C": "The permanent loss of tokens due to a smart contract exploit",
                        "D": "The decrease in trading fees during periods of low market volatility"
                    },
                    "correct": "B",
                    "explanation": "Impermanent loss occurs when the price ratio of pooled assets changes from the ratio at the time of deposit. The AMM's constant product formula forces the pool to rebalance, effectively selling the appreciating asset and buying the depreciating one. The LP ends up with less value than if they had simply held both assets. It is called impermanent because the loss reverses if prices return to the original ratio."
                },
                {
                    "id": "tm2_q11",
                    "question": "A sigmoid bonding curve has an S-shape. What is the main advantage of this curve shape for token launches?",
                    "options": {
                        "A": "It guarantees zero slippage for all transactions",
                        "B": "It provides a low initial price that accelerates through a growth phase then flattens at maturity, modeling natural adoption cycles",
                        "C": "It eliminates the need for any reserve collateral",
                        "D": "It prevents any token from ever being sold back to the curve"
                    },
                    "correct": "B",
                    "explanation": "A sigmoid curve starts flat (cheap tokens for early adopters), steepens during a growth phase (rapid price appreciation as adoption accelerates), then flattens at higher supply (price stabilization at maturity). This models natural adoption S-curves and can discourage late-stage speculation while providing price stability for a mature token economy."
                },
                {
                    "id": "tm2_q12",
                    "question": "What role does the reserve pool play in a bonding curve smart contract?",
                    "options": {
                        "A": "It stores the private keys of all token holders for account recovery",
                        "B": "It holds collateral tokens deposited by buyers, providing guaranteed liquidity for sellers to redeem against the curve",
                        "C": "It pays gas fees on behalf of token holders during transactions",
                        "D": "It stores governance proposals waiting to be voted on"
                    },
                    "correct": "B",
                    "explanation": "The reserve pool holds the collateral (e.g., ETH or DAI) deposited when tokens are minted via the bonding curve. When a holder sells tokens back to the curve (burning them), the contract pays out from this reserve at the current curve price. This guarantees that there is always liquidity available for sellers, unlike traditional order-book markets that can have empty order books."
                },
                {
                    "id": "tm2_q13",
                    "question": "If a bonding curve has a reserve ratio of 10%, what does this imply about price sensitivity?",
                    "options": {
                        "A": "The price barely moves regardless of buy or sell volume",
                        "B": "The price is extremely sensitive to supply changes, with large price swings from relatively small trades",
                        "C": "The price can only move upward, never downward",
                        "D": "The curve automatically rebalances to a 50% reserve ratio over time"
                    },
                    "correct": "B",
                    "explanation": "A low reserve ratio (10%) means only a small fraction of the token's market cap is backed by reserves. This creates a steep curve where small changes in supply produce large price movements. Conversely, a high reserve ratio (e.g., 90%) creates a nearly flat curve with minimal price sensitivity. The reserve ratio is the primary lever for tuning price volatility on a bonding curve."
                },
                {
                    "id": "tm2_q14",
                    "question": "How does Uniswap v3 concentrated liquidity differ from the standard constant product bonding curve?",
                    "options": {
                        "A": "It eliminates all trading fees for liquidity providers",
                        "B": "It allows LPs to allocate liquidity within specific price ranges rather than across the entire curve from zero to infinity",
                        "C": "It uses a linear bonding curve instead of a constant product curve",
                        "D": "It requires all liquidity to be provided in a single token rather than a pair"
                    },
                    "correct": "B",
                    "explanation": "Uniswap v3 lets liquidity providers concentrate their capital within chosen price ranges instead of spreading it across the entire 0 to infinity range. This dramatically improves capital efficiency because the liquidity is active where trading actually occurs. However, LPs face amplified impermanent loss if the price moves outside their chosen range."
                },
                {
                    "id": "tm2_q15",
                    "question": "What is a buy-sell spread (or entry-exit fee) on a bonding curve, and why might a protocol implement one?",
                    "options": {
                        "A": "A time delay between buying and selling to prevent flash loan attacks",
                        "B": "A difference between the buy price and sell price at the same supply level, creating protocol revenue and discouraging short-term speculation",
                        "C": "A mandatory holding period before tokens can be transferred to another wallet",
                        "D": "A requirement to stake governance tokens before accessing the bonding curve"
                    },
                    "correct": "B",
                    "explanation": "A buy-sell spread sets the sell price below the buy price at any given supply point, creating a gap. This serves two purposes: it generates revenue for the protocol (or funding pool) from each round-trip trade, and it discourages rapid speculation by making quick buy-sell flips unprofitable. The spread width reflects the tradeoff between revenue generation and user friction."
                },
                {
                    "id": "tm2_q16",
                    "question": "In the context of bonding curves, what does continuous token mean?",
                    "options": {
                        "A": "A token that can only be transferred in continuous (non-discrete) amounts",
                        "B": "A token whose minting and burning are governed by a bonding curve, allowing continuous (24/7) issuance and redemption without counterparties",
                        "C": "A token that continuously increases in value by a fixed daily percentage",
                        "D": "A token that requires continuous internet connectivity to hold"
                    },
                    "correct": "B",
                    "explanation": "A continuous token can be minted or burned at any time through its bonding curve smart contract, without needing a counterparty on the other side of the trade. The smart contract itself acts as the always-available market maker. This provides continuous liquidity and price discovery, unlike traditional token sales that happen at fixed events."
                },
                {
                    "id": "tm2_q17",
                    "question": "What happens to the reserve balance when tokens are sold (burned) on a bonding curve?",
                    "options": {
                        "A": "The reserve balance increases because new funds flow in",
                        "B": "The reserve balance decreases as the contract pays the seller from the reserve at the current curve price",
                        "C": "The reserve balance stays the same; payment comes from newly minted tokens",
                        "D": "The reserve is permanently locked and cannot be withdrawn under any circumstances"
                    },
                    "correct": "B",
                    "explanation": "When tokens are sold back to the bonding curve, the smart contract burns the tokens (reducing supply) and pays the seller from the reserve pool according to the current price on the curve. The reserve decreases proportionally, and the price moves down along the curve to reflect the reduced supply."
                },
                {
                    "id": "tm2_q18",
                    "question": "Why might a protocol choose a steeper bonding curve (higher exponent n in $P = S^n$)?",
                    "options": {
                        "A": "To minimize price impact for large traders and attract institutional investors",
                        "B": "To create stronger incentives for early participation by offering much lower prices at low supply",
                        "C": "To ensure all participants pay the same price regardless of when they join",
                        "D": "To reduce the amount of reserve capital needed to back the token"
                    },
                    "correct": "B",
                    "explanation": "A steeper curve (higher n) means the price at low supply is very cheap relative to the price at high supply, creating a large first-mover advantage. This strongly incentivizes early adoption because the price differential between early and late buyers is dramatic. The tradeoff is higher slippage and volatility at all supply levels."
                },
                {
                    "id": "tm2_q19",
                    "question": "How do batch auctions help mitigate front-running on bonding curves?",
                    "options": {
                        "A": "They encrypt all transaction data permanently so no one can see any trades",
                        "B": "They collect orders over a time period and execute them all at the same clearing price, eliminating the advantage of transaction ordering",
                        "C": "They require all participants to deposit exactly the same amount",
                        "D": "They only allow selling, never buying, during the batch period"
                    },
                    "correct": "B",
                    "explanation": "Batch auctions accumulate buy and sell orders over a defined time window, then execute all orders at a single uniform clearing price. Since all orders in a batch get the same price regardless of submission order, there is no advantage to front-running or sandwich attacks. This eliminates the MEV extraction that plagues real-time bonding curve transactions."
                },
                {
                    "id": "tm2_q20",
                    "question": "What is the key tradeoff between capital efficiency and price stability on a bonding curve?",
                    "options": {
                        "A": "Higher capital efficiency always leads to higher price stability",
                        "B": "A low reserve ratio improves capital efficiency (less capital locked) but reduces price stability (more volatility per trade)",
                        "C": "Capital efficiency and price stability are unrelated on bonding curves",
                        "D": "Price stability can only be achieved by using an external oracle to override the curve"
                    },
                    "correct": "B",
                    "explanation": "A low reserve ratio means the protocol locks less capital in reserves relative to the token's market cap, improving capital efficiency. However, this thin reserve makes prices highly sensitive to trades, reducing stability. A high reserve ratio provides deep liquidity and price stability but locks up significant capital. Curve designers must balance these competing objectives based on the token's purpose."
                }
            ]
        };

        const state = {
            currentIndex: 0,
            answers: {},
            score: 0,
            displayedQuestions: [],
            pendingSlots: []
        };

        const questionsRow = document.getElementById('questionsRow');
        const progressBar = document.getElementById('progressBar');
        const progressBadge = document.getElementById('progressBadge');
        const scoreBadge = document.getElementById('scoreBadge');
        const resultsCard = document.getElementById('resultsCard');
        const nextBtn = document.getElementById('nextBtn');

        function initQuiz() {
            state.currentIndex = 0;
            state.answers = {};
            state.score = 0;
            state.displayedQuestions = [];
            state.pendingSlots = [];

            resultsCard.classList.remove('show');
            questionsRow.style.display = 'grid';
            nextBtn.classList.remove('show');

            for (let i = 0; i < 3 && i < quizData.questions.length; i++) {
                state.displayedQuestions.push(i);
            }
            state.currentIndex = Math.min(3, quizData.questions.length);

            renderQuestions();
            updateStats();
        }

        function renderQuestions() {
            questionsRow.innerHTML = '';

            state.displayedQuestions.forEach((qIdx, slot) => {
                const q = quizData.questions[qIdx];
                const answered = state.answers[q.id] !== undefined;
                const isCorrect = answered && state.answers[q.id] === q.correct;
                const isIncorrect = answered && state.answers[q.id] !== q.correct;

                const card = document.createElement('div');
                card.className = 'question-card';
                if (isCorrect) card.classList.add('correct-card', 'answered');
                if (isIncorrect) card.classList.add('incorrect-card', 'answered');

                card.innerHTML = `
                    <div class="q-header">
                        <span class="q-number">Q${qIdx + 1}</span>
                        ${answered ? `<span class="q-status">${isCorrect ? '&#10004;' : '&#10008;'}</span>` : ''}
                    </div>
                    <div class="q-text">${q.question}</div>
                    <div class="options" data-qid="${q.id}" data-slot="${slot}">
                        ${['A','B','C','D'].map(letter => {
                            let optClass = 'option-btn';
                            if (answered) {
                                optClass += ' disabled';
                                if (letter === q.correct) optClass += ' correct';
                                else if (letter === state.answers[q.id]) optClass += ' incorrect';
                            }
                            return `
                                <button class="${optClass}" data-letter="${letter}" ${answered ? 'disabled' : ''}>
                                    <span class="option-letter">${letter}</span>
                                    <span class="option-text">${q.options[letter]}</span>
                                </button>
                            `;
                        }).join('')}
                    </div>
                    <div class="feedback ${answered ? 'show' : ''} ${isCorrect ? 'correct' : 'incorrect'}">
                        ${answered ? (isCorrect ? '&#10004; ' : `&#10008; Answer: ${q.correct}. `) + q.explanation : ''}
                    </div>
                `;

                if (!answered) {
                    card.querySelectorAll('.option-btn').forEach(btn => {
                        btn.addEventListener('click', () => handleAnswer(qIdx, slot, btn.dataset.letter));
                    });
                }

                questionsRow.appendChild(card);
            });

            renderMath();
        }

        function handleAnswer(qIdx, slot, letter) {
            const q = quizData.questions[qIdx];
            state.answers[q.id] = letter;

            if (letter === q.correct) state.score++;

            if (!state.pendingSlots.includes(slot)) {
                state.pendingSlots.push(slot);
            }

            updateStats();
            renderQuestions();

            const answered = Object.keys(state.answers).length;
            if (answered >= quizData.questions.length) {
                setTimeout(showResults, 800);
            } else if (state.currentIndex < quizData.questions.length && state.pendingSlots.length > 0) {
                nextBtn.classList.add('show');
            }
        }

        function loadNextQuestions() {
            while (state.pendingSlots.length > 0 && state.currentIndex < quizData.questions.length) {
                const slot = state.pendingSlots.shift();
                state.displayedQuestions[slot] = state.currentIndex;
                state.currentIndex++;
            }

            nextBtn.classList.remove('show');

            renderQuestions();

            const answered = Object.keys(state.answers).length;
            if (answered >= quizData.questions.length) {
                setTimeout(showResults, 500);
            }
        }

        function updateStats() {
            const answered = Object.keys(state.answers).length;
            const total = quizData.questions.length;

            progressBar.style.width = `${(answered / total) * 100}%`;
            progressBadge.textContent = `${answered}/${total}`;
            scoreBadge.textContent = `Score: ${state.score}`;
        }

        function showResults() {
            questionsRow.style.display = 'none';
            nextBtn.classList.remove('show');
            resultsCard.classList.add('show');

            const total = quizData.questions.length;
            const percentage = Math.round((state.score / total) * 100);

            document.getElementById('resultsScore').textContent = `${state.score}/${total}`;

            let grade, gradeClass, icon;
            if (percentage >= 90) { grade = 'Excellent! A'; gradeClass = 'grade-a'; icon = '&#127942;'; }
            else if (percentage >= 80) { grade = 'Great! B'; gradeClass = 'grade-b'; icon = '&#11088;'; }
            else if (percentage >= 70) { grade = 'Good! C'; gradeClass = 'grade-c'; icon = '&#128077;'; }
            else if (percentage >= 60) { grade = 'Pass - D'; gradeClass = 'grade-d'; icon = '&#128221;'; }
            else { grade = 'Keep practicing'; gradeClass = 'grade-f'; icon = '&#128218;'; }

            document.getElementById('resultsIcon').innerHTML = icon;
            const gradeEl = document.getElementById('resultsGrade');
            gradeEl.textContent = `${grade} (${percentage}%)`;
            gradeEl.className = `results-grade ${gradeClass}`;
        }

        function restartQuiz() {
            initQuiz();
        }

        function renderMath() {
            if (typeof renderMathInElement !== 'undefined') {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initQuiz();
            setTimeout(renderMath, 100);
        });
    </script>
</body>
</html>
