            max-width: 1400px;

        .quiz-title { font-size: 16px; font-weight: 600; color: var(--mlpurple); }

            display: flex;
            gap: 12px;
            font-size: 12px;

        .stat-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;

        .stat-progress { background: var(--quiz-light); color: var(--quiz-accent); }

            height: 4px;

            border: 2px solid var(--correct);

        }

        .question-card.incorrect-card {
            border: 2px solid var(--incorrect);

            display: flex;
            justify-content: space-between;

            background: var(--quiz-light);
            color: var(--quiz-accent);

            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 10px;

            color: white;
        }

        .option-btn.incorrect .option-letter {

        .grade-b { background: #dbeafe; color: #1e40af; }

        .results-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn {

    <script>
        const quizData = {
            questions: [
                {
                    "id": 1,
                    "question": "What is the fundamental distinction between a security token and a utility token, and why does this classification matter legally?",
                    "options": {
                        "A": "Security tokens are issued on Ethereum while utility tokens are issued on other blockchains; the chain determines regulatory treatment regardless of token economics",
                        "B": "Security tokens represent ownership stakes or economic rights in an underlying asset or enterprise (entitling holders to profits, dividends, or appreciation), while utility tokens grant access to a product or service; securities are subject to registration, disclosure, and investor-protection regulations while utility tokens generally are not",
                        "C": "Security tokens are always backed 1:1 by fiat currency in bank accounts, while utility tokens have no fiat backing; the backing requirement is what triggers securities regulation",
                        "D": "Security tokens can only be traded on registered stock exchanges, while utility tokens can trade freely on any platform; the trading venue determines the classification, not the token's economic characteristics"
                    },
                    "correct": "B",
                    "explanation": "The security vs. utility distinction is the central regulatory question in token classification. A security token derives value from an external enterprise or asset and typically confers rights similar to traditional securities: profit sharing, dividends, governance rights, or claim on assets. Examples: tokenized equity in a company, revenue-share tokens, tokenized real estate. A utility token grants access to a specific product or service within a network — it is a digital coupon, not an investment. Examples: file storage tokens, gaming tokens, API access tokens. The distinction matters enormously: securities must be registered with regulators (SEC in the US), issuers must file prospectuses, trading requires licensed exchanges, and only accredited investors may participate in many offerings. Non-compliance results in enforcement actions, disgorgement of proceeds, and criminal liability. Many projects deliberately structured tokens as 'utility' to avoid securities regulation — the SEC has challenged this when tokens had investment characteristics despite the utility label."
                },
                {
                    "id": 2,
                    "question": "A startup issues tokens that grant holders 10% of the company's annual revenue. The founder claims these are 'utility tokens' because holders can also use them to access premium features. How would a regulator likely classify these?",
                    "options": {
                        "A": "As utility tokens, because the founder's stated intent determines classification; if the whitepaper calls them utility tokens and they have access features, regulators must accept that designation",
                        "B": "As securities, because economic substance controls over legal labels — the revenue-sharing feature means token value depends primarily on the company's profits, satisfying investment contract criteria regardless of any attached access rights",
                        "C": "As a hybrid instrument exempt from securities law, because tokens with both utility and investment features fall into a regulatory gap that Congress has not addressed",
                        "D": "As commodities regulated by the CFTC rather than the SEC, because revenue-sharing tokens are derivatives on company performance metrics rather than ownership interests"
                    },
                    "correct": "B",
                    "explanation": "Regulators apply substance-over-form analysis to token classification. The SEC's position (articulated in numerous enforcement actions and the DAO Report) is that calling something a 'utility token' does not make it one if its economic characteristics resemble an investment. The dual-use token in this question has a dominant investment characteristic: 10% of annual revenue sharing. Token value rises and falls with company performance. Holders purchase expecting profits from the company's efforts. The access feature is incidental and does not transform the investment nature. The SEC's Reves test (for notes) and the Howey test (for investment contracts) both look at the economic reality of the instrument. SEC v. Telegram ($1.7B TON offering), SEC v. Kik ($5M penalty), and SEC v. Ripple all demonstrate that token labels carry little weight when economic substance indicates a security. This hybrid token would almost certainly be classified as a security."
                },
                {
                    "id": 3,
                    "question": "What are the four prongs of the Howey test, and how do courts apply them to determine whether a token is an investment contract (security)?",
                    "options": {
                        "A": "The Howey test requires: (1) a written contract between issuer and investor, (2) a fixed return promise, (3) government registration of the asset, and (4) trading on a licensed exchange — all four must be present for securities classification",
                        "B": "The Howey test finds an investment contract when there is: (1) an investment of money, (2) in a common enterprise, (3) with an expectation of profits, (4) to come predominantly from the efforts of others — all four prongs must be satisfied, and courts apply the test to the economic reality of the arrangement regardless of its label",
                        "C": "The Howey test applies only to agricultural commodity contracts and was extended to securities by subsequent legislation; for digital assets, Congress has not formally adopted Howey and the SEC applies it by administrative interpretation only",
                        "D": "The Howey test has three prongs: investment of value, expectation of gain, and reliance on a third party — the 'common enterprise' requirement was removed by the Supreme Court in 2019 as unworkable for digital assets"
                    },
                    "correct": "B",
                    "explanation": "SEC v. W.J. Howey Co. (1946) established the test that remains the definitive US framework for investment contract classification. The four prongs: (1) Investment of money — the investor commits capital (cash, crypto, or other value). (2) Common enterprise — investor fortunes are tied to the issuer or other investors (horizontal commonality: pooled funds; vertical commonality: investor linked to promoter). (3) Expectation of profits — investors expect to gain financially (appreciation, dividends, revenue share). (4) From the efforts of others — profits depend primarily on the promoter's or third party's managerial efforts, not the investor's own work. For tokens: (1) ICO participants invest ETH/USD. (2) Common enterprise: token value tied to project success. (3) Whitepaper promises/implies appreciation. (4) Project team builds the platform. All four prongs satisfied = investment contract = security. Courts apply the test flexibly to the economic substance, not the label."
                },
                {
                    "id": 4,
                    "question": "How does the 'efforts of others' prong of the Howey test apply to a decentralized protocol like Bitcoin where no central team drives value?",
                    "options": {
                        "A": "Bitcoin fails the Howey test because it is not an investment of money — Bitcoin is exchanged for Bitcoin, not for cash, so the first prong is not satisfied regardless of decentralization",
                        "B": "Bitcoin satisfies all Howey prongs and is therefore a security; the SEC has explicitly classified Bitcoin as a security in enforcement actions against major exchanges",
                        "C": "Bitcoin fails the 'efforts of others' prong because no identifiable third party's managerial efforts drive Bitcoin's value — no company controls Bitcoin development, no team can be held accountable, and value derives from decentralized network effects and market forces rather than a promoter's work; sufficiently decentralized networks are not securities under Howey",
                        "D": "Bitcoin is exempt from Howey analysis under the commodities exclusion — the CFTC has exclusive jurisdiction over all proof-of-work assets regardless of decentralization"
                    },
                    "correct": "C",
                    "explanation": "The 'efforts of others' prong is where decentralization matters most. Former SEC Director William Hinman's 2018 speech (while not official SEC policy) articulated the 'sufficiently decentralized' concept: if a network is so decentralized that no identifiable person or group's efforts are the key driver of value, the investment contract analysis may not apply. For Bitcoin: no central team, no controlling company, no CEO, development is open-source with many contributors, no tokens reserved for founders. Value comes from network adoption, miner security, and market dynamics — not a promoter's execution of a business plan. The SEC and CFTC have both indicated Bitcoin is not a security. Ethereum is more ambiguous given the Ethereum Foundation's role, though the SEC has not formally classified post-Merge ETH as a security. The analysis is a spectrum: projects with active development teams and concentrated token holdings are more likely to satisfy 'efforts of others' than mature, decentralized protocols."
                },
                {
                    "id": 5,
                    "question": "A token was issued when the project was highly centralized (satisfying all Howey prongs) but has since become fully decentralized. Can it 'graduate' out of securities classification?",
                    "options": {
                        "A": "No — once a token is issued as a security, it remains a security permanently under US law regardless of subsequent decentralization; the issuer must maintain securities compliance indefinitely",
                        "B": "Yes — SEC guidance and enforcement practice suggest that as a network becomes sufficiently decentralized (no controlling party, value from network effects rather than promoter efforts), the investment contract analysis may no longer apply; however, the transition point is legally unclear and requires careful analysis",
                        "C": "Yes — any token can cease being a security simply by adding utility features to the protocol, regardless of decentralization; utility usage automatically removes securities classification",
                        "D": "No — decentralization is irrelevant to securities classification; what matters is the initial sale conditions and whether the original token purchase agreement included an investment return clause"
                    },
                    "correct": "B",
                    "explanation": "The 'graduation' concept is one of the most contested areas of crypto securities law. Former SEC Director Hinman's framework suggested that tokens could evolve from securities to non-securities as their networks decentralize. The theory: if the promoter's efforts are no longer the key driver of value, the 'efforts of others' prong may no longer be satisfied, and the Howey test fails. The Ethereum narrative: ETH may have been a security during the 2014 presale (Vitalik and the Ethereum Foundation's efforts were critical) but gradually became sufficiently decentralized. However, this theory has complications: (1) How do you measure 'sufficient' decentralization? (2) Does the initial unlawful offering create ongoing liability? (3) Secondary market sales may still involve investment contracts. The SEC has not formally endorsed this framework in rulemaking, creating legal uncertainty. Ripple used the decentralization argument partially successfully — the court found institutional XRP sales were securities but programmatic exchange sales were not."
                },
                {
                    "id": 6,
                    "question": "What was the significance of the SEC's 2017 DAO Report, and how did it change the regulatory landscape for token offerings?",
                    "options": {
                        "A": "The DAO Report formally exempted decentralized autonomous organizations from securities law, establishing that code-based governance structures operate outside SEC jurisdiction",
                        "B": "The DAO Report was the first SEC guidance applying Howey to tokens — it concluded that DAO tokens were securities (investment of ETH, common enterprise, expectation of profits from curators' efforts), establishing that 'the federal securities laws apply to those who offer and sell securities in the United States, regardless whether the issuing entity is a traditional company or a decentralized autonomous organization'",
                        "C": "The DAO Report established that utility tokens are categorically exempt from securities regulation, providing issuers a safe harbor if tokens could be used in a product within 12 months of issuance",
                        "D": "The DAO Report created a new regulatory category called 'digital asset securities' with reduced disclosure requirements, allowing token sales to proceed without full prospectus registration"
                    },
                    "correct": "B",
                    "explanation": "The SEC's 2017 DAO Report (Report of Investigation Pursuant to Section 21(a) of the Securities Exchange Act of 1934) was the first definitive SEC guidance on token offerings. Background: The DAO (Decentralized Autonomous Organization) raised $150M in ETH in 2016 before being hacked. The SEC investigated but chose not to bring enforcement action. Instead, it issued the Report as guidance. Key findings: (1) DAO tokens were investment contracts under Howey — investors contributed ETH (investment of money) to a common enterprise (DAO treasury), expecting profits from token appreciation and dividend-like returns, through curators' efforts in selecting investments. (2) The DAO's decentralized structure did not exempt it from securities law. (3) The form of investment (crypto rather than dollars) does not change the analysis. (4) Blockchain-based tokens are subject to the same laws as traditional securities. Impact: put the entire ICO market on notice that unregistered token sales may violate securities laws. Led to numerous subsequent enforcement actions."
                },
                {
                    "id": 7,
                    "question": "In SEC v. Ripple Labs, what was the court's key distinction between institutional XRP sales and programmatic exchange sales, and why did this matter?",
                    "options": {
                        "A": "The court found all XRP sales were securities; the institutional vs. programmatic distinction was rejected as economically irrelevant because both involve the same token",
                        "B": "The court found institutional XRP sales (direct contracts with sophisticated investors who knew they were buying from Ripple) were unregistered securities offerings, but programmatic exchange sales (where buyers on exchanges did not know they were buying from Ripple and had no expectation specific to Ripple's efforts) did not satisfy all Howey prongs — the 'efforts of others' and 'expectation of profits' prongs required reasonable expectation linked to the specific seller's efforts",
                        "C": "The court found all XRP sales were not securities because XRP is a currency used for international payments; the currency exemption under the Securities Act eliminates Howey analysis for all payment tokens",
                        "D": "The court found programmatic sales were securities but institutional sales were exempt under the Section 4(a)(2) private placement exemption, which applies to all direct token sales to accredited investors"
                    },
                    "correct": "B",
                    "explanation": "Judge Analisa Torres's July 2023 ruling in SEC v. Ripple was a landmark that created a nuanced framework. Institutional sales: Ripple sold XRP directly to hedge funds and institutional investors via written contracts at discounted prices, with the investors understanding they were buying from Ripple and expecting profits from Ripple's efforts to develop XRP's ecosystem. These satisfied all Howey prongs — investment of money, common enterprise, expectation of profits from Ripple's efforts. Court found these were unregistered securities offerings. Programmatic sales: XRP sold on exchanges to anonymous buyers who did not know if they were buying from Ripple (Ripple sold into the order book). These buyers lacked 'reasonable expectation of profits from Ripple's efforts specifically' because they didn't know Ripple was the counterparty. Court found these did not satisfy the Howey test. This distinction was controversial — the SEC argued the token itself is the security, not the transaction. The ruling has been criticized as creating an anomaly where the same asset is simultaneously a security and not, depending on the sale method."
                },
                {
                    "id": 8,
                    "question": "The SEC filed suits against Coinbase (2023) and Binance (2023) alleging they operated unregistered securities exchanges. What specific tokens were alleged to be securities in these suits, and what was the legal theory?",
                    "options": {
                        "A": "The suits alleged only Bitcoin and Ethereum were securities, arguing that all proof-of-work tokens are investment contracts because miners' efforts drive value",

                    },
                    "correct": "B",
                    "explanation": "The 2023 SEC enforcement actions against Coinbase and Binance were the most significant crypto regulatory events of the year. SEC v. Coinbase (June 2023): Named SOL, ADA, MATIC, FIL, SAND, AXS, CHZ, FLOW, ICP, NEAR, VGX, DASH, and NEXO as securities. Alleged Coinbase operated as unregistered securities exchange (Section 5 of Securities Exchange Act), unregistered broker-dealer, and unregistered clearing agency. Also targeted Coinbase's staking program as an unregistered securities offering. SEC v. Binance (June 2023): Named BNB, BUSD, SOL, ADA, MATIC, ATOM, ALGO, COTI as securities. Also named BNB and BUSD as securities sold directly by Binance. Additional allegations: wash trading, commingling customer funds, and operating without registration. The legal theory for each token: applying Howey — investors bought these tokens expecting profits from the issuing teams' efforts to develop the ecosystem. These enforcement actions created massive market uncertainty and prompted legislative pressure for clearer crypto regulation."
                },
                {
                    "id": 9,
                    "question": "What is ERC-3643 (T-REX), and how does it enable compliant security token transfers on Ethereum?",
                    "options": {
                        "A": "ERC-3643 is a token standard that replaces the ERC-20 transfer function with a government-approved API that routes all transfers through a licensed broker-dealer before execution",
                        "B": "ERC-3643 (Token for Regulated EXchanges) is an on-chain compliance framework that embeds KYC/AML verification into the transfer mechanism — transfers are blocked by the smart contract unless both sender and receiver are in an on-chain identity registry as verified, eligible investors; the token contract checks investor eligibility at transfer time without revealing personal data on-chain",

                        "D": "ERC-3643 extends ERC-20 by adding a blacklist function controlled by regulators who can freeze any token balance; it requires government approval for each transfer above $10,000"
                    },
                    "correct": "B",
                    "explanation": "ERC-3643 (Token for Regulated EXchanges, also called T-REX) was developed by Tokeny Solutions and became an Ethereum standard for compliant security tokens. The core innovation: compliance checks embedded in the transfer function. Architecture: (1) Identity Registry — an on-chain registry mapping wallet addresses to verified investor identities (KYC status, country, accreditation). The actual personal data (name, passport) is stored off-chain; only attestations (claims) are on-chain. (2) Compliance Module — a smart contract defining transfer rules: allowed countries, maximum investor count, lockup periods, eligible investor types. (3) Modified transfer function — before executing any ERC-3643 transfer, the contract calls isVerified(sender) and isVerified(receiver) on the Identity Registry and checks compliance rules. If either fails, the transfer reverts automatically. (4) Privacy-preserving — the registry stores cryptographic proofs (claims from trusted identity providers) rather than personal data. Tokeny has used T-REX for $25B+ in tokenized assets."
                },
                {
                    "id": 10,
                    "question": "How does an on-chain identity registry in a system like ERC-3643 verify investor eligibility without storing personal data on the public blockchain?",

        const state = {
            currentIndex: 0,
            answers: {},
            score: 0,
            displayedQuestions: [],
            pendingSlots: []
        };

        const questionsRow = document.getElementById('questionsRow');
        const progressBar = document.getElementById('progressBar');
        const progressBadge = document.getElementById('progressBadge');
        const scoreBadge = document.getElementById('scoreBadge');
        const resultsCard = document.getElementById('resultsCard');
        const nextBtn = document.getElementById('nextBtn');

        function initQuiz() {
            state.currentIndex = 0;
            state.answers = {};
            state.score = 0;
            state.displayedQuestions = [];
            state.pendingSlots = [];

            resultsCard.classList.remove('show');
            questionsRow.style.display = 'grid';
            nextBtn.classList.remove('show');

            // Show first 3 questions
            for (let i = 0; i < 3 && i < quizData.questions.length; i++) {
                state.displayedQuestions.push(i);
            }
            state.currentIndex = Math.min(3, quizData.questions.length);

            renderQuestions();
            updateStats();
        }

        function renderQuestions() {
            questionsRow.innerHTML = '';

            state.displayedQuestions.forEach((qIdx, slot) => {
                const q = quizData.questions[qIdx];
                const answered = state.answers[q.id] !== undefined;
                const isCorrect = answered && state.answers[q.id] === q.correct;
                const isIncorrect = answered && state.answers[q.id] !== q.correct;

                const card = document.createElement('div');
                card.className = 'question-card';
                if (isCorrect) card.classList.add('correct-card', 'answered');
                if (isIncorrect) card.classList.add('incorrect-card', 'answered');

                card.innerHTML = `
                    <div class="q-header">
                        <span class="q-number">Q${qIdx + 1}</span>
                        ${answered ? `<span class="q-status">${isCorrect ? '&#10004;' : '&#10008;'}</span>` : ''}
                    </div>
                    <div class="q-text">${q.question}</div>
                    <div class="options" data-qid="${q.id}" data-slot="${slot}">
                        ${['A','B','C','D'].map(letter => {
                            let optClass = 'option-btn';
                            if (answered) {
                                optClass += ' disabled';
                                if (letter === q.correct) optClass += ' correct';
                                else if (letter === state.answers[q.id]) optClass += ' incorrect';
                            }
                            return `
                                <button class="${optClass}" data-letter="${letter}" ${answered ? 'disabled' : ''}>
                                    <span class="option-letter">${letter}</span>
                                    <span class="option-text">${q.options[letter]}</span>
                                </button>
                            `;
                        }).join('')}
                    </div>
                    <div class="feedback ${answered ? 'show' : ''} ${isCorrect ? 'correct' : 'incorrect'}">
                        ${answered ? (isCorrect ? '&#10004; ' : `&#10008; Answer: ${q.correct}. `) + q.explanation : ''}
                    </div>
                `;

                // Add click handlers
                if (!answered) {
                    card.querySelectorAll('.option-btn').forEach(btn => {
                        btn.addEventListener('click', () => handleAnswer(qIdx, slot, btn.dataset.letter));
                    });
                }

                questionsRow.appendChild(card);
            });

            renderMath();
        }

        function handleAnswer(qIdx, slot, letter) {
            const q = quizData.questions[qIdx];
            state.answers[q.id] = letter;

            if (letter === q.correct) state.score++;

            // Track this slot as pending replacement
            if (!state.pendingSlots.includes(slot)) {
                state.pendingSlots.push(slot);
            }

            updateStats();
            renderQuestions();

            // Check if all questions answered
            const answered = Object.keys(state.answers).length;
            if (answered >= quizData.questions.length) {
                // Short delay then show results
                setTimeout(showResults, 800);
            } else if (state.currentIndex < quizData.questions.length && state.pendingSlots.length > 0) {
                // Show Next button if there are more questions and pending slots
                nextBtn.classList.add('show');
            }
        }

        function loadNextQuestions() {
            // Replace pending slots with new questions
            while (state.pendingSlots.length > 0 && state.currentIndex < quizData.questions.length) {
                const slot = state.pendingSlots.shift();
                state.displayedQuestions[slot] = state.currentIndex;
                state.currentIndex++;
            }

            // Hide Next button
            nextBtn.classList.remove('show');

            renderQuestions();

            // Check if quiz is complete (all displayed questions answered)
            const answered = Object.keys(state.answers).length;
            if (answered >= quizData.questions.length) {
                setTimeout(showResults, 500);
            }
        }

        function updateStats() {
            const answered = Object.keys(state.answers).length;
            const total = quizData.questions.length;

            progressBar.style.width = `${(answered / total) * 100}%`;
            progressBadge.textContent = `${answered}/${total}`;
            scoreBadge.textContent = `Score: ${state.score}`;
        }

        function showResults() {
            questionsRow.style.display = 'none';
            nextBtn.classList.remove('show');
            resultsCard.classList.add('show');

            const total = quizData.questions.length;
            const percentage = Math.round((state.score / total) * 100);

            document.getElementById('resultsScore').textContent = `${state.score}/${total}`;

            let grade, gradeClass, icon;
            if (percentage >= 90) { grade = 'Excellent! A'; gradeClass = 'grade-a'; icon = '&#127942;'; }
            else if (percentage >= 80) { grade = 'Great! B'; gradeClass = 'grade-b'; icon = '&#11088;'; }
            else if (percentage >= 70) { grade = 'Good! C'; gradeClass = 'grade-c'; icon = '&#128077;'; }
            else if (percentage >= 60) { grade = 'Pass - D'; gradeClass = 'grade-d'; icon = '&#128221;'; }
            else { grade = 'Keep practicing'; gradeClass = 'grade-f'; icon = '&#128218;'; }

            document.getElementById('resultsIcon').innerHTML = icon;
            const gradeEl = document.getElementById('resultsGrade');
            gradeEl.textContent = `${grade} (${percentage}%)`;
            gradeEl.className = `results-grade ${gradeClass}`;
        }

        function restartQuiz() {
            initQuiz();
        }

        function renderMath() {
            if (typeof renderMathInElement !== 'undefined') {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initQuiz();
            setTimeout(renderMath, 100);
        });
    </script>
