            max-width: 1400px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 0 4px;

        .quiz-title { font-size: 16px; font-weight: 600; color: var(--mlpurple); }

            font-size: 12px;

        .stat-badge {

            border-radius: 12px;

        .stat-progress { background: var(--quiz-light); color: var(--quiz-accent); }

            font-weight: 600;
            font-size: 10px;

        .results-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

        @media (max-width: 600px) {
            .questions-row { grid-template-columns: 1fr; }

    <script>
        const quizData = {
            questions: [
                {
                    "id": 1,
                    "question": "What is the blockchain trilemma, and which three properties does it claim cannot all be simultaneously maximized?",
                    "options": {
                        "A": "The trilemma claims that blockchains cannot simultaneously achieve decentralization, security, and scalability — optimizing for any two of these properties forces a trade-off with the third",
                        "B": "The trilemma claims that blockchains cannot simultaneously achieve privacy, speed, and low cost — every design choice sacrifices at least one of these user-facing properties",
                        "C": "The trilemma claims that blockchains cannot simultaneously be open-source, profitable, and energy-efficient — corporate blockchains sacrifice openness while public chains sacrifice profitability",
                        "D": "The trilemma claims that blockchains cannot simultaneously support smart contracts, native tokens, and cross-chain interoperability — specializing in one prevents implementation of the others"
                    },
                    "correct": "A",
                    "explanation": "The blockchain trilemma (popularized by Vitalik Buterin) identifies three properties every blockchain strives for: (1) Decentralization — no single entity controls the network; anyone can run a node. (2) Security — the chain resists attacks; corrupting it requires prohibitive cost. (3) Scalability — the chain processes enough transactions to serve global demand quickly and cheaply. The trilemma argues these cannot all be maximized simultaneously. Bitcoin prioritizes security and decentralization but processes only ~7 TPS. Solana prioritizes scalability and security but runs far fewer validators, sacrificing decentralization. Ethereum Mainnet prioritizes security and decentralization but historically processed ~15-30 TPS, leading to congestion and high fees. Layer 2 solutions attempt to escape the trilemma by moving execution off-chain while inheriting Layer 1 security."
                },
                {
                    "id": 2,
                    "question": "Why does simply increasing block size NOT solve the scalability problem in a truly decentralized network?",
                    "options": {
                        "A": "Larger blocks would exceed the EVM's maximum gas limit, causing all transactions in oversized blocks to revert automatically",
                        "B": "Larger blocks increase bandwidth, storage, and sync requirements for running a full node — pricing out ordinary participants and concentrating node operation among well-resourced entities, thereby reducing decentralization",
                        "C": "Larger blocks would make the Merkle tree computation too slow for miners, causing block production to fall below the 12-second target even on high-end hardware",
                        "D": "Larger blocks are rejected by the P2P gossip protocol because the maximum UDP packet size limits block propagation to 1 MB on the internet"
                    },
                    "correct": "B",
                    "explanation": "The block size debate (exemplified by the Bitcoin block size wars of 2015-2017) reveals a key decentralization trade-off. Larger blocks process more transactions per block, but each node must download, validate, and store every block. If blocks are 1 GB instead of 1 MB, running a full node requires gigabit internet bandwidth, terabytes of disk space, and powerful CPUs for rapid validation. This raises the hardware and bandwidth bar to the point where only data centers can participate, centralizing the network. The Bitcoin Cash fork chose larger blocks and accepted this trade-off; Ethereum deliberately kept execution on-chain conservative to preserve decentralization. The fundamental insight: throughput must scale without requiring nodes to do proportionally more work — which is the design goal of sharding and Layer 2 solutions."
                },
                {
                    "id": 3,
                    "question": "Ethereum Mainnet processes approximately 15-30 TPS for simple ETH transfers. How does this compare to global payments infrastructure, and why does the gap matter?",
                    "options": {
                        "A": "Visa processes approximately 24,000 TPS peak and handles 150 million transactions daily; Ethereum at 15-30 TPS would need a ~1,000x improvement to match this — the gap explains why gas fees spike to $50-200 during high demand periods",
                        "B": "Global payments require only 100 TPS since most transactions are large-value interbank transfers; Ethereum already exceeds this with smart contract batching, so no scaling solution is needed",
                        "C": "The gap is irrelevant because blockchain transactions are fundamentally different from card payments and serve a niche market of DeFi users who accept high fees as a feature, not a bug",
                        "D": "Ethereum's 15-30 TPS already exceeds Bitcoin's 7 TPS, making it the de facto global settlement layer; Layer 2 is only needed for microtransactions below $10"
                    },
                    "correct": "A",
                    "explanation": "The throughput gap between Ethereum and global payment systems is enormous. Visa handles ~1,700 average TPS with a peak capacity of ~24,000 TPS. The global payments system processes hundreds of millions of transactions daily. Ethereum at 15-30 TPS means that during DeFi Summer 2020 and the NFT boom of 2021, the mempool backlogged thousands of transactions, driving gas prices above 500 Gwei ($50-200 per simple transfer, $200-500 for complex DeFi interactions). This renders Ethereum unusable for microtransactions, gaming, and emerging-market remittances. The scaling gap is what motivates the entire Layer 2 ecosystem. Ethereum's roadmap targets 100,000+ TPS across L1 + L2, achieved through rollups for execution scaling and danksharding for data scaling."
                },
                {
                    "id": 4,
                    "question": "What did the EIP-1559 upgrade change about Ethereum's fee mechanism, and did it solve the scalability problem?",
                    "options": {
                        "A": "EIP-1559 introduced a fixed gas price of 1 Gwei for all transactions, eliminating fee auctions and making costs perfectly predictable regardless of network congestion",
                        "B": "EIP-1559 replaced the first-price auction with a protocol-set base fee that adjusts algorithmically based on block fullness — the base fee burns ETH and increases/decreases by up to 12.5% per block; users add a priority tip for faster inclusion, improving fee predictability but not fundamentally increasing throughput",
                        "C": "EIP-1559 doubled Ethereum's block size from 15M to 30M gas, increasing effective TPS from 15 to 30 and halving average gas costs permanently for all users",
                        "D": "EIP-1559 created a separate fee market for smart contract calls versus ETH transfers, allowing DeFi users to pay premium fees without pricing out simple transfers"
                    },
                    "correct": "B",
                    "explanation": "EIP-1559 (implemented in the London upgrade, August 2021) reformed Ethereum's fee market. Before: users bid arbitrary gas prices in a first-price auction, leading to unpredictable fees and overpaying. After: a protocol-computed base fee adjusts each block — if the previous block was more than 50% full, the base fee rises by up to 12.5%; if less than 50% full, it falls. The base fee is burned (deflationary for ETH supply). Users specify a max fee and a priority tip. The base fee gives wallets a reliable estimate for the next block. However, EIP-1559 did NOT increase throughput — it only doubled the max block size (15M to 30M gas target vs. max) to give the base fee room to adjust. During periods of extreme demand, fees still spike very high. EIP-1559 improved user experience but does not solve scalability; that requires Layer 2 or sharding."
                },
                {
                    "id": 5,
                    "question": "During the CryptoKitties congestion event of December 2017, Ethereum processed only about 12 TPS while average gas prices rose 600%. What does this event reveal about blockspace economics?",
                    "options": {
                        "A": "The event revealed that NFT smart contracts are inherently more dangerous than simple transfers and should be prohibited from using more than 10% of available blockspace",
                        "B": "The event revealed that blockspace is a scarce resource with inelastic supply — validators cannot quickly increase throughput in response to demand spikes, so price (gas fees) must rise until demand drops to match fixed supply capacity, pricing out lower-value transactions",
                        "C": "The event revealed that Ethereum's proof-of-work consensus was the bottleneck and that switching to proof-of-stake would have prevented the congestion entirely",
                        "D": "The event revealed that peer-to-peer protocols are fundamentally unsuited to consumer applications and that Ethereum should implement centralized sequencing to handle demand spikes"
                    },
                    "correct": "B",
                    "explanation": "CryptoKitties (December 2017) was Ethereum's first major congestion event: a popular NFT breeding game flooded the mempool with transactions, causing pending transaction queues to reach 30,000+ and average fees to spike 600%. This revealed fixed-supply blockspace economics: Ethereum produces one block roughly every 12-14 seconds with a fixed gas limit (~15M gas). When demand exceeds this capacity, the fee auction raises prices until marginal users give up and wait. This is analogous to rush-hour highway tolling. Blockspace has near-zero marginal cost to produce but fixed throughput, making it subject to extreme price volatility during demand spikes. Only users who can justify paying high fees (large-value DeFi arbitrage, liquidations) remain active; retail users and low-value transactions get priced out. This fee exclusion effect is a primary motivation for Layer 2."
                },
                {
                    "id": 6,
                    "question": "Why did the Ethereum merge (transition from proof-of-work to proof-of-stake in September 2022) NOT significantly improve transaction throughput?",
                    "options": {
                        "A": "The merge was purely a consensus mechanism change — it replaced energy-intensive mining with validator staking but kept the same block structure, gas limits, and execution engine, leaving throughput essentially unchanged at ~15-30 TPS",
                        "B": "The merge reduced throughput because proof-of-stake validators sign blocks more slowly than miners compute them, so block times increased from 12 to 15 seconds",
                        "C": "The merge was designed to increase throughput by 10x, but a bug in the execution layer limited actual improvements to only 5%, and a fix is scheduled for the next hard fork",
                        "D": "The merge eliminated block rewards paid to miners, but this budget was redirected to fund Layer 2 development grants, indirectly improving ecosystem throughput over 2-3 years"
                    },
                    "correct": "A",
                    "explanation": "The merge is one of the most misunderstood events in Ethereum history. Many believed switching from PoW to PoS would dramatically speed up the network. In reality, the merge was a consensus mechanism substitution only: the execution layer (EVM, transaction processing, gas limits) remained identical. The merge changed how blocks are proposed (validators with staked ETH instead of miners with ASICs), reduced energy consumption by 99.95%, and enabled future upgrades. But it did NOT increase the gas limit, change block structure, or improve EVM execution speed. Ethereum's throughput remained ~15-30 TPS after the merge. The roadmap's scaling improvements come from subsequent upgrades: EIP-4844 (blobs), full Danksharding (data availability for rollups), and the rollup-centric execution model — not the consensus change itself."
                },
                {
                    "id": 7,
                    "question": "What is 'data availability' and why is it a critical bottleneck for Ethereum's rollup-centric scaling strategy?",
                    "options": {
                        "A": "Data availability refers to the uptime of Ethereum nodes — if fewer than 51% of nodes are online simultaneously, transactions cannot be confirmed, creating an availability bottleneck",
                        "B": "Data availability is the guarantee that the data needed to reconstruct and verify blockchain state is published and accessible to all participants; it is a bottleneck because rollups must post their transaction data to Ethereum to inherit its security, and the cost of this data represents the dominant cost for rollup users",
                        "C": "Data availability describes the archival of historical blocks — Ethereum nodes prune blocks older than 1 year, creating gaps in transaction history that prevent zero-knowledge proofs from verifying past state transitions",
                        "D": "Data availability is a measure of how quickly new validators can synchronize the full chain state; slower sync times reduce the number of active validators and therefore decrease the security budget"
                    },
                    "correct": "B",
                    "explanation": "Data availability (DA) is a foundational concept in blockchain scaling. A block has 'data availability' if all nodes can download and verify the full block data — meaning no data is withheld that would be needed to detect fraud or reconstruct state. For rollups, DA is critical: a rollup operator must post compressed transaction data to Ethereum L1 so that anyone can reconstruct rollup state and challenge invalid transitions. Before EIP-4844, rollup calldata cost ~16 gas per byte on Ethereum L1. For a rollup processing 100 TPS, posting this data costs millions of dollars per day. EIP-4844 (Dencun upgrade, March 2024) introduced 'blobs' — dedicated data containers at ~8 Gwei/byte instead of ~16+ Gwei/byte for calldata — reducing rollup data costs by 80-90% and making rollups economically viable for mass adoption. Full Danksharding will extend this to 64 blobs per block."
                },
                {
                    "id": 8,
                    "question": "What is the correct taxonomy of Layer 2 solutions, and what distinguishes each major category?",
                    "options": {
                        "A": "Layer 2 solutions are classified as either 'fast' (instant finality, centralized) or 'slow' (7-day finality, decentralized); the trade-off is purely between withdrawal speed and security",
                        "B": "The main L2 categories are: rollups (execute off-chain, post data on-chain, inherit L1 security), state channels (bilateral off-chain channels closed to L1), sidechains (independent chains with separate security), and validiums (off-chain execution with off-chain data, using validity proofs) — each with distinct trust assumptions and security models",
                        "C": "Layer 2 solutions are classified solely by their consensus mechanism: PoW L2s (sidechains), PoS L2s (rollups), and PoA L2s (state channels) — the consensus model determines all security and performance properties",
                        "D": "L2 classification is based on token economics: fee-sharing L2s return sequencer revenue to L1 validators, non-fee-sharing L2s retain revenue within the L2 ecosystem — this distinction is the primary factor in security model differences"
                    },
                    "correct": "B",
                    "explanation": "The L2 taxonomy is nuanced. Rollups (optimistic and ZK) are the dominant modern category: execution happens off-chain with a sequencer, but all transaction data (or validity proofs) are posted to Ethereum L1, inheriting its security. Anyone can reconstruct rollup state from L1 data alone. State channels (Lightning Network on Bitcoin, Raiden/Connext on Ethereum) require bilateral off-chain communication between specific parties, settling disputes to L1 — suited for repeated interactions between fixed participants. Sidechains (Polygon PoS, BSC) are fully independent blockchains with their own validator sets and consensus — they do NOT inherit Ethereum security; their security depends entirely on their own stakers. Validiums (StarkEx in validium mode, Immutable X) use ZK validity proofs posted to L1 but store data off-chain with a data availability committee — a hybrid with different trust assumptions."
                },
                {
                    "id": 9,
                    "question": "A sidechain like Polygon PoS uses a bridge to connect to Ethereum. Why does this bridge NOT give users Ethereum-level security for their bridged assets?",
                    "options": {
                        "A": "Polygon PoS bridges use optimistic assumptions and require a 7-day challenge period before withdrawals; during this period, assets are exposed to validator fraud and cannot be recovered if stolen",
                        "B": "The bridge's security depends on the sidechain's own validator set — if a supermajority of Polygon validators collude or are compromised, they can produce a fraudulent finality proof allowing them to drain the bridge escrow on Ethereum Mainnet, regardless of Ethereum's own security",
                        "C": "Ethereum smart contracts cannot natively verify Polygon block headers, so the bridge relies on a centralized oracle run by the Polygon team to relay state roots — this oracle is the single point of failure",
                        "D": "Sidechain bridges are inherently insecure because they use multisig wallets controlled by only 3 signers, making them vulnerable to any two signers colluding to steal funds"
                    },
                    "correct": "B",
                    "explanation": "Bridge security for sidechains is the critical distinction from rollups. A rollup bridge inherits Ethereum's security because its state roots are verified by fraud proofs or validity proofs on Ethereum — an attacker must break Ethereum's consensus to steal funds. A sidechain bridge works differently: assets are locked in a smart contract on Ethereum, and the sidechain's validators attest that the corresponding wrapped assets were burned before releasing locked funds. The trust assumption is: the sidechain's validator set is honest. If 2/3 of Polygon PoS validators collude, they can fraudulently attest to a burn that never happened and drain the Ethereum bridge escrow. Polygon PoS has ~100 validators — far fewer than Ethereum's 900,000+ validators — making collusion more feasible. The Ronin bridge hack ($625M, March 2022) exploited exactly this: 5 of 9 multisig signers were compromised. This bridge security distinction drives the L2 security hierarchy."
                },
                {
                    "id": 10,
                    "question": "What is a 'validium' and how does it differ from a ZK-rollup in terms of security guarantees?",
                    "options": {
                        "A": "A validium uses optimistic fraud proofs while a ZK-rollup uses validity proofs — the proof type is the only difference; both store all transaction data on Ethereum Mainnet identically",
                        "B": "A validium is a ZK-rollup running on a sidechain — it posts validity proofs to the sidechain's L1 rather than Ethereum, making it cheaper but with sidechain-level security rather than Ethereum-level security",
                        "C": "A validium uses ZK validity proofs (same as a ZK-rollup) to ensure correct execution, but stores transaction data off-chain with a permissioned data availability committee rather than on Ethereum L1 — meaning users cannot reconstruct their state if the committee withholds data, even though computation integrity is guaranteed",
                        "D": "A validium is a deprecated term for the original Plasma design; modern validiums are identical to optimistic rollups but use a different dispute resolution mechanism called 'validity challenges' instead of fraud proofs"
                    },
                    "correct": "C",
                    "explanation": "Validiums are ZK-rollup variants that sacrifice data availability for lower costs. A ZK-rollup posts both: (1) the validity proof (ZK-SNARK/STARK proving correct execution) to Ethereum, AND (2) compressed transaction data to Ethereum so anyone can reconstruct state. A validium posts only (1) the validity proof — transaction data is stored by a trusted Data Availability Committee (DAC), typically 5-20 known operators. Security implications: validity proofs guarantee that the state transition was computed correctly — you cannot create fraudulent proofs. However, if the DAC withholds data, users cannot prove their balances or exit their funds, even though no funds were stolen. This is the 'data withholding attack'. StarkEx (powering dYdX v3, Immutable X, Sorare) operates in validium mode, choosing throughput (100,000+ TPS) and low cost over full data availability."

        const state = {
            currentIndex: 0,
            answers: {},
            score: 0,
            displayedQuestions: [],
            pendingSlots: []
        };

        const questionsRow = document.getElementById('questionsRow');
        const progressBar = document.getElementById('progressBar');
        const progressBadge = document.getElementById('progressBadge');
        const scoreBadge = document.getElementById('scoreBadge');
        const resultsCard = document.getElementById('resultsCard');
        const nextBtn = document.getElementById('nextBtn');

        function initQuiz() {
            state.currentIndex = 0;
            state.answers = {};
            state.score = 0;
            state.displayedQuestions = [];
            state.pendingSlots = [];

            resultsCard.classList.remove('show');
            questionsRow.style.display = 'grid';
            nextBtn.classList.remove('show');

            // Show first 3 questions
            for (let i = 0; i < 3 && i < quizData.questions.length; i++) {
                state.displayedQuestions.push(i);
            }
            state.currentIndex = Math.min(3, quizData.questions.length);

            renderQuestions();
            updateStats();
        }

        function renderQuestions() {
            questionsRow.innerHTML = '';

            state.displayedQuestions.forEach((qIdx, slot) => {
                const q = quizData.questions[qIdx];
                const answered = state.answers[q.id] !== undefined;
                const isCorrect = answered && state.answers[q.id] === q.correct;
                const isIncorrect = answered && state.answers[q.id] !== q.correct;

                const card = document.createElement('div');
                card.className = 'question-card';
                if (isCorrect) card.classList.add('correct-card', 'answered');
                if (isIncorrect) card.classList.add('incorrect-card', 'answered');

                card.innerHTML = `
                    <div class="q-header">
                        <span class="q-number">Q${qIdx + 1}</span>
                        ${answered ? `<span class="q-status">${isCorrect ? '&#10004;' : '&#10008;'}</span>` : ''}
                    </div>
                    <div class="q-text">${q.question}</div>
                    <div class="options" data-qid="${q.id}" data-slot="${slot}">
                        ${['A','B','C','D'].map(letter => {
                            let optClass = 'option-btn';
                            if (answered) {
                                optClass += ' disabled';
                                if (letter === q.correct) optClass += ' correct';
                                else if (letter === state.answers[q.id]) optClass += ' incorrect';
                            }
                            return `
                                <button class="${optClass}" data-letter="${letter}" ${answered ? 'disabled' : ''}>
                                    <span class="option-letter">${letter}</span>
                                    <span class="option-text">${q.options[letter]}</span>
                                </button>
                            `;
                        }).join('')}
                    </div>
                    <div class="feedback ${answered ? 'show' : ''} ${isCorrect ? 'correct' : 'incorrect'}">
                        ${answered ? (isCorrect ? '&#10004; ' : `&#10008; Answer: ${q.correct}. `) + q.explanation : ''}
                    </div>
                `;

                // Add click handlers
                if (!answered) {
                    card.querySelectorAll('.option-btn').forEach(btn => {
                        btn.addEventListener('click', () => handleAnswer(qIdx, slot, btn.dataset.letter));
                    });
                }

                questionsRow.appendChild(card);
            });

            renderMath();
        }

        function handleAnswer(qIdx, slot, letter) {
            const q = quizData.questions[qIdx];
            state.answers[q.id] = letter;

            if (letter === q.correct) state.score++;

            // Track this slot as pending replacement
            if (!state.pendingSlots.includes(slot)) {
                state.pendingSlots.push(slot);
            }

            updateStats();
            renderQuestions();

            // Check if all questions answered
            const answered = Object.keys(state.answers).length;
            if (answered >= quizData.questions.length) {
                // Short delay then show results
                setTimeout(showResults, 800);
            } else if (state.currentIndex < quizData.questions.length && state.pendingSlots.length > 0) {
                // Show Next button if there are more questions and pending slots
                nextBtn.classList.add('show');
            }
        }

        function loadNextQuestions() {
            // Replace pending slots with new questions
            while (state.pendingSlots.length > 0 && state.currentIndex < quizData.questions.length) {
                const slot = state.pendingSlots.shift();
                state.displayedQuestions[slot] = state.currentIndex;
                state.currentIndex++;
            }

            // Hide Next button
            nextBtn.classList.remove('show');

            renderQuestions();

            // Check if quiz is complete (all displayed questions answered)
            const answered = Object.keys(state.answers).length;
            if (answered >= quizData.questions.length) {
                setTimeout(showResults, 500);
            }
        }

        function updateStats() {
            const answered = Object.keys(state.answers).length;
            const total = quizData.questions.length;

            progressBar.style.width = `${(answered / total) * 100}%`;
            progressBadge.textContent = `${answered}/${total}`;
            scoreBadge.textContent = `Score: ${state.score}`;
        }

        function showResults() {
            questionsRow.style.display = 'none';
            nextBtn.classList.remove('show');
            resultsCard.classList.add('show');

            const total = quizData.questions.length;
            const percentage = Math.round((state.score / total) * 100);

            document.getElementById('resultsScore').textContent = `${state.score}/${total}`;

            let grade, gradeClass, icon;
            if (percentage >= 90) { grade = 'Excellent! A'; gradeClass = 'grade-a'; icon = '&#127942;'; }
            else if (percentage >= 80) { grade = 'Great! B'; gradeClass = 'grade-b'; icon = '&#11088;'; }
            else if (percentage >= 70) { grade = 'Good! C'; gradeClass = 'grade-c'; icon = '&#128077;'; }
            else if (percentage >= 60) { grade = 'Pass - D'; gradeClass = 'grade-d'; icon = '&#128221;'; }
            else { grade = 'Keep practicing'; gradeClass = 'grade-f'; icon = '&#128218;'; }

            document.getElementById('resultsIcon').innerHTML = icon;
            const gradeEl = document.getElementById('resultsGrade');
            gradeEl.textContent = `${grade} (${percentage}%)`;
            gradeEl.className = `results-grade ${gradeClass}`;
        }

        function restartQuiz() {
            initQuiz();
        }

        function renderMath() {
            if (typeof renderMathInElement !== 'undefined') {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initQuiz();
            setTimeout(renderMath, 100);
        });
    </script>
