                    "question": "What are the three defining properties of a zero-knowledge proof? Define each property precisely.",
                    "options": {
                        "A": "Completeness (a true statement always has a valid proof), Soundness (a false statement cannot have a valid proof except with negligible probability), and Zero-Knowledge (the proof reveals no information about the witness beyond the truth of the statement)",
                        "B": "Correctness (all computations are free of arithmetic errors), Privacy (no participant's identity is revealed), and Efficiency (proofs verify faster than re-executing the computation)",
                        "C": "Decentralization (no single party controls proof generation), Transparency (all proof parameters are publicly auditable), and Succinctness (proofs are shorter than the original computation)",

                    },
                    "correct": "A",
                    "explanation": "The three canonical properties of a zero-knowledge proof system, formalized by Goldwasser, Micali, and Rackoff in 1985: (1) Completeness — if the statement is true and both prover and verifier follow the protocol, the verifier will accept the proof. A correct prover can always convince a correct verifier of a true statement. (2) Soundness — if the statement is false, no cheating prover can convince an honest verifier to accept except with negligible probability (the 'soundness error'). This is the security property — it prevents false proofs from being accepted. (3) Zero-Knowledge — the verifier learns nothing from the interaction beyond the single bit 'the statement is true.' Formally, for every verifier strategy, there exists a simulator that can produce transcripts indistinguishable from real proofs without knowing the witness. The classic example: Alice proves she knows the solution to a graph coloring problem without revealing the coloring itself."
                },
                {
                    "id": 2,
                    "question": "What is the 'witness' in a zero-knowledge proof, and how does it relate to the NP-completeness of ZK-provable statements?",
                    "options": {

                        "C": "The witness is a third-party auditor who validates both the prover's and verifier's computations — NP-completeness means witness selection is computationally hard, ensuring security",
                        "D": "The witness is the mathematical commitment scheme binding the prover's input — only P-class problems (solvable in polynomial time) can be proven with ZK proofs, which is why they are efficient"
                    },
                    "correct": "B",
                    "explanation": "In ZK proof terminology, the witness (often denoted w) is the secret information the prover holds. The proof system works over a relation R(x, w): x is the public statement, w is the private witness. The prover demonstrates that there exists a w such that R(x, w) = 1, without revealing w. Examples: (1) ZK login: x = public key hash, w = private key; proof shows knowledge of the private key. (2) ZK transaction: x = new state root, w = all individual transactions; proof shows the state transition was computed correctly without revealing transaction details. The NP connection is fundamental: NP is exactly the class of problems where solutions (witnesses) can be verified in polynomial time. Since ZK proofs prove membership in NP languages, any NP statement can in principle be proven with ZK. For ZK rollups, the 'witness' is the entire batch of transactions, and the proof shows the state transition was computed correctly."
                },
                {
                    "id": 3,
                    "question": "In ZK rollup terminology, what is an 'arithmetic circuit,' and why must computations be expressed as circuits before ZK proofs can be generated?",
                    "options": {
                        "A": "An arithmetic circuit is the hardware accelerator (FPGA or ASIC) used to generate ZK proofs — computations must be mapped to hardware circuits to achieve the proof generation speeds required for production rollups",
                        "B": "An arithmetic circuit is a directed acyclic graph (DAG) of addition and multiplication gates over a finite field; computations must be expressed as circuits because ZK proof systems (SNARKs, STARKs) operate on polynomial constraints over finite fields, and a circuit defines the set of polynomial equations the prover must satisfy",
                        "C": "Arithmetic circuits are the smart contracts deployed on Layer 1 that verify ZK proofs — all computation verification happens in Solidity circuits rather than in a separate proof system",
                        "D": "An arithmetic circuit is a cryptographic hash function used to commit to intermediate computation states; circuits are needed to ensure each computation step is independently verifiable without revealing the full computation"
                    },
                    "correct": "B",
                    "explanation": "ZK proof systems (SNARKs and STARKs) operate on polynomial arithmetic over finite fields, not on traditional computer instructions. To generate a ZK proof for a computation, that computation must first be expressed as an arithmetic circuit — a DAG where wires carry field elements and gates perform addition or multiplication. For example, proving knowledge of x such that x^3 + x + 5 = 35 requires a circuit with mul gates (x*x = x2, x2*x = x3), add gates, and a constant gate. The circuit defines a system of polynomial constraints (R1CS — Rank-1 Constraint System). For a ZK rollup, the entire state transition function (signature verification, balance updates, Merkle proofs) must be expressed as a circuit. This is why zkEVMs are hard: the EVM has operations like SHA-256, KECCAK, and elliptic curve ops that are expensive to express in arithmetic circuits, requiring thousands of constraints per operation."
                },
                {
                    "id": 4,
                    "question": "What does SNARK stand for, and what are the three core properties that make ZK-SNARKs suitable for blockchain applications?",

                        "C": "Standardized Nonce-Anchored Recursive Knowledge — the three properties are determinism (same input always produces same proof), immutability (proofs cannot be modified after generation), and universality (one proof system works for all computation types)",
                        "D": "Symmetric Non-interactive Audit Record of Knowledge — properties are auditability (proofs create permanent records), reversibility (proofs can be undone by the prover), and consensus (multiple provers must agree before a proof is valid)"
                    },
                    "correct": "A",
                    "explanation": "SNARK stands for Succinct Non-interactive ARgument of Knowledge. The three properties are critical for blockchain use: (1) Succinct — proof size is O(1) or polylogarithmic in computation size. Groth16 proofs are ~200 bytes regardless of whether the computation has 1,000 or 1,000,000 constraints. Ethereum L1 verification costs are fixed (~300,000 gas). Without succinctness, verifying proofs on-chain would be prohibitively expensive. (2) Non-interactive — the single proof replaces an interactive challenge-response protocol. This is enabled by the Fiat-Shamir transform or, in SNARKs, by a Common Reference String (CRS) setup. Non-interactivity is essential for on-chain verification where there is no live verifier. (3) Argument of Knowledge — 'Argument' (not 'Proof') indicates computational soundness: security holds against polynomial-time adversaries, not information-theoretically. 'Knowledge' means the prover must actually know the witness — it cannot generate a proof through side channels without possessing the secret."

                // Add click handlers
                if (!answered) {
                    card.querySelectorAll('.option-btn').forEach(btn => {
                        btn.addEventListener('click', () => handleAnswer(qIdx, slot, btn.dataset.letter));
                    });
                }

                questionsRow.appendChild(card);
            });

            renderMath();
        }

        function handleAnswer(qIdx, slot, letter) {
            const q = quizData.questions[qIdx];
            state.answers[q.id] = letter;

            if (letter === q.correct) state.score++;

            // Track this slot as pending replacement
            if (!state.pendingSlots.includes(slot)) {
                state.pendingSlots.push(slot);
            }

            updateStats();
            renderQuestions();

            // Check if all questions answered
            const answered = Object.keys(state.answers).length;
            if (answered >= quizData.questions.length) {
                // Short delay then show results
                setTimeout(showResults, 800);
            } else if (state.currentIndex < quizData.questions.length && state.pendingSlots.length > 0) {
                // Show Next button if there are more questions and pending slots
                nextBtn.classList.add('show');
            }
        }

        function loadNextQuestions() {
            // Replace pending slots with new questions
            while (state.pendingSlots.length > 0 && state.currentIndex < quizData.questions.length) {
                const slot = state.pendingSlots.shift();
                state.displayedQuestions[slot] = state.currentIndex;
                state.currentIndex++;
            }

            // Hide Next button
            nextBtn.classList.remove('show');

            renderQuestions();

            // Check if quiz is complete (all displayed questions answered)
            const answered = Object.keys(state.answers).length;
            if (answered >= quizData.questions.length) {
                setTimeout(showResults, 500);
            }
        }

        function updateStats() {
            const answered = Object.keys(state.answers).length;
            const total = quizData.questions.length;

            progressBar.style.width = `${(answered / total) * 100}%`;
            progressBadge.textContent = `${answered}/${total}`;
            scoreBadge.textContent = `Score: ${state.score}`;
        }

        function showResults() {
            questionsRow.style.display = 'none';
            nextBtn.classList.remove('show');
            resultsCard.classList.add('show');

            const total = quizData.questions.length;
            const percentage = Math.round((state.score / total) * 100);

            document.getElementById('resultsScore').textContent = `${state.score}/${total}`;

            let grade, gradeClass, icon;
            if (percentage >= 90) { grade = 'Excellent! A'; gradeClass = 'grade-a'; icon = '&#127942;'; }
            else if (percentage >= 80) { grade = 'Great! B'; gradeClass = 'grade-b'; icon = '&#11088;'; }
            else if (percentage >= 70) { grade = 'Good! C'; gradeClass = 'grade-c'; icon = '&#128077;'; }
            else if (percentage >= 60) { grade = 'Pass - D'; gradeClass = 'grade-d'; icon = '&#128221;'; }
            else { grade = 'Keep practicing'; gradeClass = 'grade-f'; icon = '&#128218;'; }

            document.getElementById('resultsIcon').innerHTML = icon;
            const gradeEl = document.getElementById('resultsGrade');
            gradeEl.textContent = `${grade} (${percentage}%)`;
            gradeEl.className = `results-grade ${gradeClass}`;
        }

        function restartQuiz() {
            initQuiz();
        }

        function renderMath() {
            if (typeof renderMathInElement !== 'undefined') {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initQuiz();
            setTimeout(renderMath, 100);
        });
    </script>
</body>
</html>
